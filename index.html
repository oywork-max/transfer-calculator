<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>송금대상액 계산기</title>

<meta name="theme-color" content="#9ACD32">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
}

body{
background:#f6f7f8;
padding:16px;
max-width:700px;
margin:auto;
}

.card{
background:white;
border-radius:18px;
padding:16px;
margin-bottom:14px;
box-shadow:0 2px 12px rgba(0,0,0,.08);
}

h1{
text-align:center;
margin-bottom:16px;
color:#4d6b00;
font-size:26px;
}

.label{
font-weight:700;
margin-bottom:8px;
}

#targetAmount{
width:100%;
height:42px;
font-size:22px;
padding:10px;
border:2px solid #cfe58b;
border-radius:12px;
}

.money-item{
display:grid;
grid-template-columns:
70px
42px
60px
42px
1fr;

align-items:center;

gap:6px;

padding:8px 0;

border-bottom:1px solid #eee;
}

.money-item:last-child{
border-bottom:none;
}

.denom{
font-weight:700;
font-size:15px;
}

.action-btn{
width:32px;
height:32px;
border:none;
border-radius:10px;
background:#9ACD32;
color:white;
font-size:20px;
font-weight:700;
}

.qty{
width:100%;
height:42px;
text-align:center;
font-size:18px;
border:1px solid #ccc;
border-radius:10px;
}

.amount{
text-align:right;
font-weight:700;
font-size:15px;
}

.summary{
text-align:center;
}

.total{
font-size:34px;
font-weight:800;
color:#4d6b00;
}

.diff{
margin-top:8px;
font-size:18px;
}

.status{
margin-top:10px;
padding:12px;
border-radius:12px;
font-weight:700;
}

.match{
background:#e8f5d0;
color:#4d6b00;
}

.short{
background:#fdeaea;
color:#c62828;
}

.over{
background:#eaf2ff;
color:#1565c0;
}

.reset-btn{
width:100%;
height:52px;
border:none;
border-radius:12px;
background:#4d6b00;
color:white;
font-size:18px;
font-weight:700;
}

@media(max-width:430px){

.money-item{

grid-template-columns:
55px
36px
52px
36px
1fr;

gap:4px;

}

.denom{
font-size:13px;
}

.amount{
font-size:13px;
}

}

</style>

</head>

<body>

<h1>송금대상액 계산기</h1>

<div class="card">

<div class="label">
송금대상금액
</div>

<input
id="targetAmount"
type="number"
placeholder="금액 입력">

</div>

<div
class="card"
id="moneyList">
</div>

<div class="card summary">

<div>총액</div>

<div
id="total"
class="total">
0원
</div>

<div
id="difference"
class="diff">
차이 : 0원
</div>

<div
id="status"
class="status match">
🟢 정확히 일치
</div>

</div>

<button
class="reset-btn"
onclick="resetAll()">
초기화 </button>

<script>

const moneyData = [
["10만원",100000],
["5만원",50000],
["1만원",10000],
["5천원",5000],
["1천원",1000],
["500원",500],
["100원",100],
["50원",50],
["10원",10]
];

const moneyList =
document.getElementById("moneyList");

moneyData.forEach((item,index)=>{

moneyList.innerHTML += `

<div class="money-item">

<div class="denom">
${item[0]}
</div>

<button
class="action-btn"
onclick="changeQty(${index},-1)">
-
</button>

<input
id="qty${index}"
class="qty"
type="number"
value="0"
min="0"
oninput="calculate()">

<button
class="action-btn"
onclick="changeQty(${index},1)">
+
</button>

<div
class="amount"
id="sum${index}">
0원
</div>

</div>

`;

});

function changeQty(index,amount){

const input =
document.getElementById(
"qty"+index
);

let value =
Number(input.value)||0;

value += amount;

if(value < 0){
value = 0;
}

input.value = value;

calculate();

}

function calculate(){

let total = 0;

moneyData.forEach((item,index)=>{

const qty =
Number(
document.getElementById(
"qty"+index
).value
)||0;

const sum =
qty * item[1];

total += sum;

document.getElementById(
"sum"+index
).innerText =
sum.toLocaleString() + "원";

});

document.getElementById(
"total"
).innerText =
total.toLocaleString() + "원";

const target =
Number(
document.getElementById(
"targetAmount"
).value
)||0;

const diff =
target - total;

document.getElementById(
"difference"
).innerText =
"차이 : " +
diff.toLocaleString() +
"원";

const status =
document.getElementById(
"status"
);

status.className =
"status";

if(diff===0){

status.classList.add(
"match"
);

status.innerText =
"🟢 정확히 일치";

}else if(diff>0){

status.classList.add(
"short"
);

status.innerText =
"🔴 " +
diff.toLocaleString() +
"원 부족";

}else{

status.classList.add(
"over"
);

status.innerText =
"🔵 " +
Math.abs(diff).toLocaleString() +
"원 초과";

}

}

function resetAll(){

document.getElementById(
"targetAmount"
).value="";

document
.querySelectorAll(".qty")
.forEach(x=>x.value=0);

calculate();

}

calculate();

</script>

</body>
</html>
